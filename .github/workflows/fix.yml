name: Remove H and CPP Files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  remove-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete .h and .cpp files
        run: |
          find . -type f \( -name "*.h" -o -name "*.cpp" \) -not -path "./.git/*" -delete

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Remove all .h and .cpp files"
          git push
